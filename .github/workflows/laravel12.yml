name: Laravel Docker Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Construir Docker
        run: docker build -t laravel-app .

      - name: Verificar contenedor
        run: docker run -d -p 8000:8000 laravel-app